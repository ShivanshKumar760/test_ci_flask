apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaskapi-ci-test
spec:
  selector:
    matchLabels:
      app: flaskapi-ci-test
  template:
    metadata:
      labels:
        app: flaskapi-ci-test
    spec:
      containers:
        - name: flaskapi-ci-test
          image: shivansh760/flask-api:0ea5ac02ff1a842005286fab311624870f592195
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 5000
