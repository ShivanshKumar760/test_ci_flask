apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaskapi-ci-test
spec:
  selector:
    matchLabels:
      app: flaskapi-ci-test
  template:
    metadata:
      labels:
        app: flaskapi-ci-test
    spec:
      containers:
        - name: flaskapi-ci-test
          image: shivansh760/flask-api:246d7017d0133bc660c9c31fccf112fad9e9d9b0
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 5000
